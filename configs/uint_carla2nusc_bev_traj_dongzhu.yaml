his: 6
fut: 6
# logger options
image_save_iter: 10000        # How often do you want to save output images during training
image_display_iter: 100       # How often do you want to display output images during training
display_size: 4               # How many images do you want to display each time
snapshot_save_iter: 10000     # How often do you want to save trained models
log_iter: 1                   # How often do you want to log the training stats

# optimization options
max_iter: 1000000             # maximum number of training iterations
batch_size: 4                # batch size
weight_decay: 0.0001          # weight decay
beta1: 0.5                    # Adam parameter
beta2: 0.999                  # Adam parameter
init: kaiming                 # initialization [gaussian/kaiming/xavier/orthogonal]
lr: 0.0001                    # initial learning rate
lr_policy: step               # learning rate scheduler
step_size: 100000             # how often to decay learning rate
gamma: 0.5                    # how much to decay learning rate
gan_w: 1                      # weight of adversarial loss
recon_x_w: 10                 # weight of image reconstruction loss
recon_h_w: 0                  # weight of hidden reconstruction loss
recon_kl_w: 0.01              # weight of KL loss for reconstruction
recon_x_cyc_w: 10             # weight of cycle consistency loss
recon_kl_cyc_w: 0.01          # weight of KL loss for cycle consistency
vgg_w: 1                      # weight of domain-invariant perceptual loss

# model options
gen:
  dim: 64                     # number of filters in the bottommost layer
  activ: relu                 # activation function [relu/lrelu/prelu/selu/tanh]
  n_downsample: 2             # number of downsampling layers in content encoder
  n_res: 4                    # number of residual blocks in content encoder/decoder
  pad_type: reflect           # padding type [zero/reflect]
dis:
  dim: 32                     # number of filters in the bottommost layer
  norm: none                  # normalization layer [none/bn/in/ln]
  activ: lrelu                # activation function [relu/lrelu/prelu/selu/tanh]
  n_layer: 4                  # number of layers in D
  gan_type: lsgan             # GAN loss [lsgan/nsgan]
  num_scales: 3               # number of scales
  pad_type: reflect           # padding type [zero/reflect]

# data options
input_dim_a: 3                              # number of image channels [1/3]
input_dim_b: 3                              # number of image channels [1/3]
num_workers: 8                              # number of data loading threads
# new_size: 256                             # first resize the shortest image side to this size
# crop_image_height: 256                      # random crop image of this height
# crop_image_width: 256                       # random crop image of this width

# bev
SEMANTIC.SEG_N_CHANNELS: 8
SEMANTIC.SEG_USE_TOP_K: True  # backprop only top-k hardest pixels
SEMANTIC.SEG_TOP_K_RATIO: 0.25
SEMANTIC.SEG_USE_WEIGHTS: True
BEV.SIZE: [192, 192]  # width, height. note that the bev is rotated, so width corresponds to forward direction.
BEV.RESOLUTION: 0.2  # pixel size in m
BEV.OFFSET_FORWARD: -64  # offset of the center of gravity of the egocar relative to the center of bev in px
BEV.FEATURE_DOWNSAMPLE: 4  # Downsample factor for bev features
BEV.FRUSTUM_POOL.D_BOUND: [1.0, 38.0, 1.0]
BEV.FRUSTUM_POOL.SPARSE: True
BEV.FRUSTUM_POOL.SPARSE_COUNT: 10
INSTANCE_SEG.CENTER_LABEL_SIGMA_PX: 4
INSTANCE_SEG.IGNORE_INDEX: 255
INSTANCE_SEG.CENTER_LOSS_WEIGHT: 200.0
INSTANCE_SEG.OFFSET_LOSS_WEIGHT: 0.1
LOSSES.WEIGHT_SEGMENTATION: 0.05
LOSSES.WEIGHT_INSTANCE: 0.05


data_root: /media/ps/data/dujiatong/carla2nusc2/     # dataset folder location
bev_dongzhu: True